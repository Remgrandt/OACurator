<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link id="app-icon" rel="icon" type="image/svg+xml" href="/oac-logo-dark-mode.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OA Curator</title>
    <script>
      window.__OAC_STARTUP_TRACE_EVENTS = [
        {
          name: "html_head_script",
          category: "html",
          timestampMs: performance.timeOrigin + performance.now(),
          source: "webview",
          detail: {
            href: window.location.href,
          },
        },
      ];
    </script>
    <style>
      html,
      body,
      #root {
        min-height: 100%;
        margin: 0;
        background: #282a36;
        color: #f8f8f2;
      }

      body {
        min-height: 100vh;
        overflow: hidden;
      }

      .startup-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #282a36;
        color: #f8f8f2;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      .startup-card {
        display: grid;
        gap: 12px;
        justify-items: center;
        color: #6272a4;
      }

      .startup-card img {
        width: 120px;
        height: 120px;
      }

      .startup-title {
        color: #f8f8f2;
        font-weight: 700;
        letter-spacing: 0;
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div class="startup-shell" role="status" aria-live="polite">
        <div class="startup-card">
          <img src="/oac-logo-app.svg" alt="" />
          <div class="startup-title">OA Curator</div>
          <div>Starting workbench...</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
